<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ball" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f7d87a"/>
      <stop offset="55%" stop-color="#e0a832"/>
      <stop offset="100%" stop-color="#b87818"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="32" cy="33" r="18"/>
    </clipPath>
  </defs>
  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="13" fill="#4a2b68"/>
  <!-- Ombre portée -->
  <circle cx="33" cy="35" r="18" fill="#00000025"/>
  <!-- Pelote -->
  <circle cx="32" cy="33" r="18" fill="url(#ball)"/>
  <!-- Filés de laine (trame croisée) -->
  <g clip-path="url(#c)" stroke="#9a6010" stroke-width="1.7" fill="none" opacity="0.5">
    <ellipse cx="32" cy="33" rx="18" ry="8"/>
    <ellipse cx="32" cy="33" rx="8" ry="18"/>
    <ellipse cx="32" cy="33" rx="18" ry="11" transform="rotate(45 32 33)"/>
    <ellipse cx="32" cy="33" rx="18" ry="11" transform="rotate(-45 32 33)"/>
  </g>
  <!-- Reflet -->
  <ellipse cx="25" cy="26" rx="5" ry="4" fill="#fff" opacity="0.22"/>
  <!-- Fil qui dépasse (haut droit) -->
  <path d="M 47 18 C 53 12 58 7 55 3" stroke="#f7d87a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
